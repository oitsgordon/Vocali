# Codemagic workflow for Vocali's Capacitor iOS wrapper.
#
# Current purpose:
# - Build the Capacitor iOS shell in the cloud.
# - Load Vocali from the hosted Vercel production URL.
# - Avoid Apple code signing until App Store Connect credentials are ready.
#
# Signing placeholders to configure later in Codemagic, not in this file:
# - Apple Developer Team ID
# - App Store Connect API key
# - iOS signing certificate
# - provisioning profile
# - TestFlight/App Store export method

workflows:
  ios-capacitor-cloud-build:
    name: iOS Capacitor cloud build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.vocali.app"
        CAPACITOR_SERVER_URL: "https://vocali-zeta.vercel.app/"
        APPLE_TEAM_ID: "REPLACE_WITH_APPLE_DEVELOPER_TEAM_ID_WHEN_SIGNING"
    scripts:
      - name: Show build configuration
        script: |
          echo "Bundle ID: $BUNDLE_ID"
          echo "Xcode project: $XCODE_PROJECT"
          echo "Xcode scheme: $XCODE_SCHEME"
          echo "Capacitor server URL: $CAPACITOR_SERVER_URL"
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Verify web app
        script: |
          npm run lint
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Build unsigned iOS simulator app
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog

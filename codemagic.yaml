# Codemagic workflow for Vocali's Capacitor iOS wrapper.
#
# Current purpose:
# - Build a signed App Store IPA for TestFlight.
# - Load Vocali from the hosted Vercel production URL.
#
# Signing requirements to configure in Codemagic:
# - Apple Developer Portal integration named below
# - Apple Distribution certificate
# - App Store provisioning profile for com.vocali.app

workflows:
  ios-capacitor-cloud-build:
    name: iOS Capacitor cloud build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: vocali-upload
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vocali.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.vocali.app"
        APP_APPLE_ID: "6780807774"
        CAPACITOR_SERVER_URL: "https://vocali-zeta.vercel.app/"
    scripts:
      - name: Show build configuration
        script: |
          echo "Bundle ID: $BUNDLE_ID"
          echo "App Store Connect Apple ID: $APP_APPLE_ID"
          echo "Xcode project: $XCODE_PROJECT"
          echo "Xcode scheme: $XCODE_SCHEME"
          echo "Capacitor server URL: $CAPACITOR_SERVER_URL"
      - name: Verify App Store Connect app access
        script: |
          set -e

          echo "Checking direct App Store Connect access to app $APP_APPLE_ID..."
          app-store-connect apps get "$APP_APPLE_ID" --json

          echo "Checking App Store Connect bundle ID lookup for $BUNDLE_ID..."
          APP_LOOKUP_JSON="$(app-store-connect apps list \
            --bundle-id-identifier "$BUNDLE_ID" \
            --strict-match-identifier \
            --platform IOS \
            --json)"
          echo "$APP_LOOKUP_JSON"

          if ! printf '%s' "$APP_LOOKUP_JSON" | grep -q "$APP_APPLE_ID"; then
            echo "The selected App Store Connect integration cannot map $BUNDLE_ID to app $APP_APPLE_ID."
            echo "Check that the API key belongs to the same App Store Connect provider/team and has access to Vocali."
            exit 1
          fi

          echo "Latest uploaded build for version 1.0, if any:"
          app-store-connect get-latest-build-number "$APP_APPLE_ID" \
            --platform IOS \
            --version-string 1.0 \
            --include-version || true
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Verify web app
        script: |
          npm run lint
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build signed App Store IPA
        script: |
          echo "Committed iOS build numbers:"
          grep "CURRENT_PROJECT_VERSION" "$CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj"

          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

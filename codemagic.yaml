# Codemagic workflow for Vocali's Capacitor iOS wrapper.
# This first workflow validates that the iOS project builds in the cloud without
# requiring Apple code signing. Add signing later when you are ready for TestFlight.

workflows:
  ios-capacitor-cloud-build:
    name: iOS Capacitor cloud build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        CAPACITOR_SERVER_URL: "https://vocali-zeta.vercel.app/"
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Verify web app
        script: |
          npm run lint
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npm run cap:sync:ios
      - name: Build unsigned iOS simulator app
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog

# Codemagic workflow for Vocali's Capacitor iOS wrapper.
#
# Current purpose:
# - Build a signed App Store IPA for TestFlight.
# - Load Vocali from the hosted Vercel production URL.
#
# Signing requirements to configure in Codemagic:
# - Apple Developer Portal integration named below
# - Apple Distribution certificate
# - App Store provisioning profile for com.vocali.app

workflows:
  ios-capacitor-cloud-build:
    name: iOS Capacitor cloud build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: vocali
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.vocali.app
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.vocali.app"
        CAPACITOR_SERVER_URL: "https://vocali-zeta.vercel.app/"
    scripts:
      - name: Show build configuration
        script: |
          echo "Bundle ID: $BUNDLE_ID"
          echo "Xcode project: $XCODE_PROJECT"
          echo "Xcode scheme: $XCODE_SCHEME"
          echo "Capacitor server URL: $CAPACITOR_SERVER_URL"
      - name: Install npm dependencies
        script: |
          npm ci
      - name: Verify web app
        script: |
          npm run lint
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set iOS build number
        script: |
          IOS_BUILD_NUMBER=$((${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-1}} + 100))
          PBXPROJ="$CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj"

          echo "Using iOS build number: $IOS_BUILD_NUMBER"
          echo "IOS_BUILD_NUMBER=$IOS_BUILD_NUMBER" >> "$CM_ENV"

          export IOS_BUILD_NUMBER
          perl -0pi -e 's/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = $ENV{"IOS_BUILD_NUMBER"};/g' "$PBXPROJ"

          UPDATED_COUNT=$(grep -c "CURRENT_PROJECT_VERSION = $IOS_BUILD_NUMBER;" "$PBXPROJ")
          if [ "$UPDATED_COUNT" -lt 2 ]; then
            echo "Expected to update both CURRENT_PROJECT_VERSION entries, but found $UPDATED_COUNT."
            grep "CURRENT_PROJECT_VERSION" "$PBXPROJ" || true
            exit 1
          fi

          if grep -q "CURRENT_PROJECT_VERSION = 1;" "$PBXPROJ"; then
            echo "CURRENT_PROJECT_VERSION is still 1 after update."
            grep "CURRENT_PROJECT_VERSION" "$PBXPROJ"
            exit 1
          fi

          grep "CURRENT_PROJECT_VERSION" "$PBXPROJ"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build signed App Store IPA
        script: |
          if [ -z "$IOS_BUILD_NUMBER" ]; then
            echo "No Codemagic build number was available for CFBundleVersion."
            exit 1
          fi

          echo "Using iOS build number: $IOS_BUILD_NUMBER"
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CURRENT_PROJECT_VERSION=$IOS_BUILD_NUMBER"
      - name: Verify IPA build number
        script: |
          IPA_PATH=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" -print -quit)

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found to verify."
            exit 1
          fi

          rm -rf /tmp/vocali-ipa-check
          mkdir -p /tmp/vocali-ipa-check
          unzip -q "$IPA_PATH" -d /tmp/vocali-ipa-check

          INFO_PLIST=$(find /tmp/vocali-ipa-check/Payload -path "*.app/Info.plist" -print -quit)
          if [ -z "$INFO_PLIST" ]; then
            echo "No app Info.plist found inside IPA."
            exit 1
          fi

          IPA_BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFO_PLIST")

          echo "IPA path: $IPA_PATH"
          echo "IPA CFBundleVersion: $IPA_BUILD_NUMBER"

          if [ "$IPA_BUILD_NUMBER" != "$IOS_BUILD_NUMBER" ]; then
            echo "Expected IPA CFBundleVersion to be $IOS_BUILD_NUMBER."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

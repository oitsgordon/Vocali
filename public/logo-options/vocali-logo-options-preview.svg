    <text x="34" y="96" fill="#607086" font-family="Arial, sans-serif" font-size="20" font-weight="600">Smaller waveform, calmer and friendlier.</text>
    <g transform="translate(32 116) scale(0.19)" filter="url(#softShadow)">
